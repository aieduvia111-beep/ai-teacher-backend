<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Płatność anulowana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .cancel-box {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
        }
        
        .icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #ff9800;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        p {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .button {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1em;
            transition: transform 0.3s;
            margin: 10px;
        }
        
        .button:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="cancel-box">
        <div class="icon">😔</div>
        <h1>Płatność anulowana</h1>
        <p>
            Nic się nie stało! Możesz spróbować ponownie w dowolnym momencie.<br><br>
            Nadal możesz korzystać z wersji <strong>FREE</strong> bez ograniczeń!
        </p>
        <a href="/static/pricing.html" class="button">
            🔄 Spróbuj ponownie
        </a>
        <a href="/static/lesson_planner.html" class="button">
            📚 Wróć do nauki
        </a>
    </div>
</body>
</html>

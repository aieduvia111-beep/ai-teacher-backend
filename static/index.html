<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eduvia AI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c6aff">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#07070d;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;}
  .splash{display:flex;flex-direction:column;align-items:center;gap:20px;}
  .logo{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#7c6aff,#4f3fcf);display:flex;align-items:center;justify-content:center;font-size:2.2em;font-weight:800;color:white;animation:pulse 1.5s ease-in-out infinite;}
  .name{font-size:1.8em;font-weight:800;color:white;letter-spacing:-.03em;}
  .sub{font-size:.85em;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(124,106,255,.4);}50%{box-shadow:0 0 0 16px rgba(124,106,255,0);}}
</style>
</head>
<body>
<div class="splash">
  <div class="logo">E</div>
  <div class="name">Eduvia</div>
  <div class="sub">AI Learning Platform</div>
</div>
<script>
  setTimeout(() => { window.location.href = 'login.html'; }, 1500);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eduvia — Status</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#07070d;--s1:#0f0f18;--s2:#13131f;--accent:#7c6aff;--accent2:#a78bfa;--green:#22d3a0;--red:#f87171;--gold:#f5a623;--text:#eeeef5;--muted:#8888a0;--h:'Syne',sans-serif;}
body{background:var(--bg);color:var(--text);font-family:var(--h);min-height:100vh;padding:0 0 40px;}
header{padding:24px 32px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:1.1em;font-weight:800;letter-spacing:-.04em;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo span{font-size:.7em;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-left:6px;font-weight:400;}
.overall{display:flex;align-items:center;gap:8px;padding:6px 16px;border-radius:100px;font-size:.72em;font-weight:700;}
.overall.ok{background:rgba(34,211,160,.1);border:1px solid rgba(34,211,160,.25);color:var(--green);}
.overall.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--red);}
.overall.loading{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);color:var(--gold);}
.dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite;}
.dot.green{background:var(--green);box-shadow:0 0 8px var(--green);}
.dot.red{background:var(--red);}
.dot.gold{background:var(--gold);box-shadow:0 0 8px var(--gold);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
main{max-width:700px;margin:40px auto;padding:0 24px;}
.section-title{font-size:.6em;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.services{display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,.045);border-radius:16px;overflow:hidden;margin-bottom:32px;}
.svc{background:var(--s1);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;transition:background .2s;}
.svc:hover{background:var(--s2);}
.svc-left{display:flex;align-items:center;gap:12px;}
.svc-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.svc-name{font-size:.88em;font-weight:700;}
.svc-desc{font-size:.68em;color:var(--muted);margin-top:2px;font-weight:400;}
.svc-right{display:flex;align-items:center;gap:10px;}
.status-badge{padding:4px 11px;border-radius:100px;font-size:.62em;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.status-badge.ok{background:rgba(34,211,160,.1);color:var(--green);border:1px solid rgba(34,211,160,.2);}
.status-badge.err{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.status-badge.loading{background:rgba(245,166,35,.1);color:var(--gold);border:1px solid rgba(245,166,35,.2);}
.ping{font-size:.65em;color:var(--muted);font-weight:400;min-width:50px;text-align:right;}
.updated{text-align:center;font-size:.65em;color:var(--muted);margin-top:8px;}
.refresh-btn{display:block;margin:20px auto 0;padding:9px 24px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:100px;color:var(--muted);font-family:var(--h);font-size:.72em;font-weight:700;cursor:pointer;transition:all .2s;}
.refresh-btn:hover{border-color:rgba(255,255,255,.22);color:var(--text);}
.history{background:var(--s1);border-radius:14px;padding:18px 20px;margin-bottom:24px;}
.history-title{font-size:.65em;font-weight:700;color:var(--muted);margin-bottom:12px;letter-spacing:.08em;text-transform:uppercase;}
.hist-row{display:flex;gap:4px;align-items:flex-end;}
.hist-bar{flex:1;border-radius:3px;transition:height .3s;}
.hist-label{display:flex;justify-content:space-between;margin-top:6px;}
.hist-label span{font-size:.58em;color:var(--muted2,#55556a);}
</style>
</head>
<body>
<header>
  <div class="logo">Eduvia <span>Status</span></div>
  <div class="overall loading" id="overall"><div class="dot gold"></div><span id="overallTxt">Sprawdzam...</span></div>
</header>
<main>
  <div class="section-title">Usługi</div>
  <div class="services" id="services"></div>
  <div class="updated" id="updated">Sprawdzanie...</div>
  <button class="refresh-btn" onclick="checkAll()">↻ Odśwież</button>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const _fbApp = initializeApp({apiKey:"AIzaSyBq9RSMSRWnVEkvMvIqtU4ZNemZhmJUiOU",authDomain:"eduvia-c69bc.firebaseapp.com",projectId:"eduvia-c69bc"});
const _fdb = getFirestore(_fbApp);
async function loadErrors(){
  try{
    const q=query(collection(_fdb,"errors"),orderBy("timestamp","desc"),limit(10));
    const snap=await getDocs(q);
    const sec=document.getElementById("errSec");
    const lst=document.getElementById("errList");
    if(!snap.empty){
      sec.style.display="block";
      lst.innerHTML="";
      snap.forEach(d=>{
        const data=d.data();
        const el=document.createElement("div");
        el.style.cssText="padding:11px 14px;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);border-radius:10px;margin-bottom:6px;";
        el.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-family:var(--h);font-size:.74em;font-weight:700;color:#f87171;">'+( data.service||"?")+'</span><span style="font-size:.62em;color:var(--muted);">'+new Date(data.timestamp).toLocaleString("pl-PL")+'</span></div><div style="font-size:.74em;color:rgba(255,255,255,.65);">'+( data.error||"")+'</div>';
        lst.appendChild(el);
      });
    }
  }catch(e){}
}

// PIN protection
(function(){
  const CORRECT = '2223';
  const stored = sessionStorage.getItem('eduvia_status_pin');
  if(stored !== CORRECT){
    const pin = prompt('Podaj PIN aby zobaczyc status:');
    if(pin !== CORRECT){
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Syne,sans-serif;color:#8888a0;font-size:.9em;">Brak dostepu</div>';
      return;
    }
    sessionStorage.setItem('eduvia_status_pin', CORRECT);
  }
})();

const BASE = 'https://eduvia-backend-2.onrender.com';

const SERVICES = [
  {
    name: 'Voice AI',
    desc: 'Korepetytor głosowy z tablicą',
    color: '#7c6aff',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>',
    url: BASE + '/health/voice',
    method: 'GET'
  },
  {
    name: 'Chat AI',
    desc: 'Czat z AI korepetytor',
    color: '#38bdf8',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
    url: BASE + '/health/chat',
    method: 'GET'
  },
  {
    name: 'Quiz AI',
    desc: 'Quizy z dowolnego tematu',
    color: '#22d3a0',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    url: BASE + '/health/quiz',
    method: 'GET'
  },
  {
    name: 'Notatki AI',
    desc: 'Generowanie notatek PDF',
    color: '#f472b6',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    url: BASE + '/health/notes',
    method: 'GET'
  },
  {
    name: 'Sprawdziany AI',
    desc: 'Generowanie sprawdzianów PDF',
    color: '#f5a623',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
    url: BASE + '/health/exam',
    method: 'GET'
  },
  {
    name: 'Plan Nauki',
    desc: 'Personalizowany plan nauki AI',
    color: '#a78bfa',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    url: BASE + '/health/lessons',
    method: 'GET'
  },
];

function renderServices(){
  const c = document.getElementById('services');
  c.innerHTML = SERVICES.map((s,i) => `
    <div class="svc" id="svc_${i}">
      <div class="svc-left">
        <div class="svc-icon" style="background:rgba(${hexToRgb(s.color)},.12);border:1px solid rgba(${hexToRgb(s.color)},.2);color:${s.color}">${s.icon}</div>
        <div>
          <div class="svc-name">${s.name}</div>
          <div class="svc-desc">${s.desc}</div>
        </div>
      </div>
      <div class="svc-right">
        <span class="ping" id="ping_${i}">—</span>
        <span class="status-badge loading" id="badge_${i}">Sprawdzam</span>
      </div>
    </div>
  `).join('');
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

async function checkService(i){
  const s = SERVICES[i];
  const badge = document.getElementById('badge_'+i);
  const ping = document.getElementById('ping_'+i);
  const start = Date.now();
  try{
    const res = await fetch(s.url, {method: s.method, signal: AbortSignal.timeout(8000)});
    const ms = Date.now() - start;
    const data = await res.json().catch(()=>({}));
    if(res.ok && data.status!=='error'){
      badge.className = 'status-badge ok';
      badge.textContent = 'Dziala';
      ping.textContent = ms + 'ms';
    } else {
      badge.className = 'status-badge err';
      const errMsg = data.errors && data.errors[0] ? data.errors[0] : ('Blad '+res.status);
      badge.textContent = errMsg;
      ping.textContent = ms + 'ms';
    }
    return res.ok;
  } catch(e){
    const ms = Date.now() - start;
    badge.className = 'status-badge err';
    badge.textContent = 'Offline';
    ping.textContent = '—';
    return false;
  }
}

async function checkAll(){
  const overall = document.getElementById('overall');
  const overallTxt = document.getElementById('overallTxt');
  const dot = overall.querySelector('.dot');
  overall.className = 'overall loading';
  dot.className = 'dot gold';
  overallTxt.textContent = 'Sprawdzam...';

  // Reset badges
  SERVICES.forEach((_,i) => {
    document.getElementById('badge_'+i).className = 'status-badge loading';
    document.getElementById('badge_'+i).textContent = 'Sprawdzam';
  });

  const results = await Promise.all(SERVICES.map((_,i) => checkService(i)));
  const allOk = results.every(r => r);
  const someOk = results.some(r => r);

  if(allOk){
    overall.className = 'overall ok';
    dot.className = 'dot green';
    overallTxt.textContent = 'Wszystkie systemy działają';
  } else if(someOk) {
    overall.className = 'overall loading';
    dot.className = 'dot gold';
    overallTxt.textContent = 'Częściowe problemy';
  } else {
    overall.className = 'overall err';
    dot.className = 'dot red';
    overallTxt.textContent = 'Przerwa techniczna';
  }

  const now = new Date();
  document.getElementById('updated').textContent = 'Ostatnie sprawdzenie: ' + now.toLocaleTimeString('pl-PL');
}

renderServices();
checkAll();
setInterval(checkAll, 60000);
loadErrors();
setInterval(loadErrors, 30000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiszki — Eduvia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root{
  --bg:#07070d;--s1:#0f0f18;--s2:#161622;
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.12);
  --accent:#7c6aff;--accent2:#a78bfa;
  --green:#22d3a0;--red:#f87171;
  --text:#eeeef5;--muted:#55556a;--muted2:#8888a0;
  --h:'Syne',sans-serif;--b:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--b);overflow:hidden;}

/* GRAIN */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}

/* GLOW BG */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 80% 10%, rgba(124,106,255,0.12), transparent),
    radial-gradient(ellipse 50% 40% at 10% 90%, rgba(34,211,160,0.07), transparent);
}

/* SCREEN */
.screen{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:16px;padding:18px 22px 14px;flex-shrink:0;}
.x-btn{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:rgba(255,255,255,.05);border:1px solid var(--border-hi);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.2s;color:var(--muted2);text-decoration:none;
}
.x-btn:hover{background:rgba(255,255,255,.09);color:var(--text);}
.x-btn svg{width:15px;height:15px;}
.prog-wrap{flex:1;display:flex;flex-direction:column;gap:7px;}
.prog-meta{display:flex;justify-content:space-between;align-items:center;}
.prog-count{font-family:var(--h);font-size:.72em;font-weight:700;color:var(--muted2);}
.prog-scores{display:flex;gap:12px;}
.ps{font-family:var(--h);font-size:.72em;font-weight:700;}
.ps-ok{color:var(--green);}
.ps-no{color:var(--red);}
.prog-bar{height:7px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--accent),var(--accent2),var(--green));}

/* CARD SCENE */
.card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 22px;perspective:1300px;}
.card-scene{width:100%;max-width:500px;cursor:pointer;user-select:none;}
.card{
  position:relative;width:100%;height:300px;
  transform-style:preserve-3d;
  transition:transform .52s cubic-bezier(.4,0,.2,1);
}
@media(max-height:680px){.card{height:230px;}}
.card.flipped{transform:rotateY(180deg);}

.face{
  position:absolute;inset:0;backface-visibility:hidden;
  border-radius:24px;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:36px 30px;gap:14px;text-align:center;
}

/* FRONT — fioletowy jak quiz-cta */
.face-front{
  background:linear-gradient(145deg,rgba(124,106,255,0.18),rgba(79,63,207,0.12));
  border:1px solid rgba(124,106,255,0.4);
  box-shadow:0 16px 60px rgba(0,0,0,.5), 0 0 40px rgba(124,106,255,.1), inset 0 1px 0 rgba(255,255,255,.08);
}

/* BACK — zielony */
.face-back{
  background:linear-gradient(145deg,rgba(34,211,160,0.16),rgba(16,100,78,0.1));
  border:1px solid rgba(34,211,160,0.38);
  box-shadow:0 16px 60px rgba(0,0,0,.5), 0 0 40px rgba(34,211,160,.1), inset 0 1px 0 rgba(255,255,255,.08);
  transform:rotateY(180deg);
}

.face-tag{
  font-family:var(--h);font-size:.62em;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
}
.face-front .face-tag{color:rgba(167,139,250,.9);}
.face-back .face-tag{color:rgba(34,211,160,.9);}

.face-text{
  font-size:1.15em;line-height:1.65;
  color:var(--text);font-weight:400;
  max-width:400px;
}

.face-sub{
  font-size:.72em;color:var(--muted);
  display:flex;align-items:center;gap:5px;margin-top:2px;
}
.face-sub svg{width:12px;height:12px;opacity:.35;}

/* BOTTOM */
.bottom{flex-shrink:0;padding:12px 22px 30px;display:flex;flex-direction:column;align-items:center;gap:10px;}

.ctrl-row{display:flex;gap:10px;width:100%;max-width:500px;}
.ctrl-btn{
  flex:1;height:54px;border-radius:16px;
  font-family:var(--h);font-size:.84em;font-weight:700;
  cursor:pointer;border:none;
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:all .18s;
}
.ctrl-btn svg{width:18px;height:18px;flex-shrink:0;}

/* Nie — jak czerwony przycisk retry */
.btn-no{
  background:rgba(248,113,113,.08);
  border:1px solid rgba(248,113,113,.2);
  color:var(--red);
}
.btn-no:hover{background:rgba(248,113,113,.15);transform:translateY(-2px);box-shadow:0 6px 20px rgba(248,113,113,.15);}
.btn-no:active{transform:translateY(0);}

/* Tak — jak quiz-cta-btn gradient */
.btn-yes{
  background:linear-gradient(135deg,rgba(34,211,160,.15),rgba(16,160,110,.08));
  border:1px solid rgba(34,211,160,.25);
  color:var(--green);
  box-shadow:0 4px 14px rgba(34,211,160,.1);
}
.btn-yes:hover{background:linear-gradient(135deg,rgba(34,211,160,.22),rgba(16,160,110,.14));transform:translateY(-2px);box-shadow:0 8px 24px rgba(34,211,160,.2);}
.btn-yes:active{transform:translateY(0);}

.tap-hint{font-size:.7em;color:var(--muted);text-align:center;height:18px;}

/* RESULT */
.result{
  flex:1;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  padding:24px;gap:26px;
  animation:fadeUp .4s ease;
}
.result.show{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

.res-ring{
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,106,255,.1),rgba(34,211,160,.06));
  border:1px solid rgba(124,106,255,.2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 0 60px rgba(124,106,255,.12),0 0 0 12px rgba(124,106,255,.04);
}
.res-pct{
  font-family:var(--h);font-size:2.2em;font-weight:800;
  background:linear-gradient(135deg,var(--accent2),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.res-sub{font-size:.62em;color:var(--muted2);font-family:var(--h);font-weight:700;letter-spacing:.1em;-webkit-text-fill-color:var(--muted2);}
.res-msg{font-size:.9em;color:var(--muted2);text-align:center;max-width:300px;line-height:1.7;}

.res-btns{display:flex;gap:10px;width:100%;max-width:500px;}
.res-btn{
  flex:1;height:52px;border-radius:14px;
  font-family:var(--h);font-size:.8em;font-weight:700;
  cursor:pointer;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  text-decoration:none;
}
.res-btn svg{width:15px;height:15px;}
.res-p{background:linear-gradient(135deg,rgba(124,106,255,.12),rgba(79,63,207,.06));border:1px solid rgba(124,106,255,.25);color:var(--accent2);}
.res-p:hover{background:linear-gradient(135deg,rgba(124,106,255,.2),rgba(79,63,207,.12));}
.res-s{background:transparent;border:1px solid var(--border-hi);color:var(--muted2);}
.res-s:hover{border-color:rgba(255,255,255,.2);color:var(--text);}

/* LOADING */
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.spin{width:36px;height:36px;border:2px solid var(--border-hi);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-t{font-family:var(--h);font-size:.82em;font-weight:700;color:var(--muted2);}
</style>
</head>
<body>
<div class="screen">
  <!-- TOP -->
  <div class="topbar">
    <a href="chat.html" class="x-btn" id="closeBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </a>
    <div class="prog-wrap">
      <div class="prog-meta">
        <div class="prog-count" id="pCount">— / —</div>
        <div class="prog-scores">
          <span class="ps ps-ok" id="sOk">✓ 0</span>
          <span class="ps ps-no" id="sNo">✗ 0</span>
        </div>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- CARD -->
  <div class="card-area" id="cardArea">
    <div class="loading">
      <div class="spin"></div>
      <div class="load-t">Generuję fiszki...</div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result" id="resultArea">
    <div class="res-ring">
      <div class="res-pct" id="rPct">0%</div>
      <div class="res-sub">wynik</div>
    </div>
    <div class="res-msg" id="rMsg"></div>
    <div class="res-btns">
      <button class="res-btn res-p" onclick="restart()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10"/></svg>
        Powtórz
      </button>
      <a href="chat.html" class="res-btn res-s">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Zamknij
      </a>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom" id="bottomArea" style="display:none">
    <div class="ctrl-row" id="ctrlRow" style="visibility:hidden">
      <button class="ctrl-btn btn-no" onclick="answer(false)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Nie wiedziałem
      </button>
      <button class="ctrl-btn btn-yes" onclick="answer(true)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Wiedziałem
      </button>
    </div>
    <div class="tap-hint" id="tapHint">Dotknij kartę aby zobaczyć odpowiedź</div>
  </div>
</div>

<script>
const BASE = window.location.origin;
let cards=[], cur=0, ok=0, fail=0, flipped=false;

const p = new URLSearchParams(window.location.search);
const topic = p.get('topic') || localStorage.getItem('fc_topic') || '';
const level = p.get('level') || localStorage.getItem('fc_level') || 'liceum';
const subject = p.get('subject') || localStorage.getItem('fc_subject') || 'matematyka';

async function generate(attempt=1){
  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 60000);
    const r = await fetch(BASE+'/api/v1/quiz/generate-topic',{signal:controller.signal,
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        topic:topic||'ogólne', subject, level,
        num_questions:10, difficulty:'medium',
        wlasne_instrukcje:`Wygeneruj FISZKI edukacyjne. Poziom: ${level}. Pytanie = krótkie pojęcie lub termin (max 1 zdanie). Wyjaśnienie = definicja dopasowana do poziomu ${level} (max 2 zdania). Podstawówka: proste. Liceum: maturalne. Studia: naukowe definicje.`
      })
    });
    clearTimeout(timeout);
    const d = await r.json();
    if(!d.success) throw new Error(d.error);
    cards = d.quiz.questions.map(q=>({f:q.question,b:q.explanation}));
    showCards();
  }catch(e){
    if(attempt < 4){
      setTimeout(()=>generate(attempt+1), 4000);
      document.getElementById('cardArea').innerHTML='<div class="loading"><div class="spin"></div><div class="load-t">Generuję fiszki...</div></div>';
    } else {
      document.getElementById('cardArea').innerHTML='<div style="text-align:center;color:var(--red);font-size:.85em;line-height:2.2;">Błąd generowania.<br><a href="chat.html" style="color:var(--accent2);text-decoration:none;font-family:var(--h);font-weight:700;">← Wróć</a></div>';
    }
  }
}

function showCards(){
  cur=0;ok=0;fail=0;flipped=false;
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('bottomArea').style.display='flex';
  document.getElementById('cardArea').innerHTML=`
    <div class="card-scene" onclick="flip()">
      <div class="card" id="C">
        <div class="face face-front">
          <div class="face-tag">Pojęcie</div>
          <div class="face-text" id="FT"></div>
          <div class="face-sub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10"/></svg>dotknij aby odwrócić</div>
        </div>
        <div class="face face-back">
          <div class="face-tag">Odpowiedź</div>
          <div class="face-text" id="BT"></div>
          <div class="face-sub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>wiedziałeś?</div>
        </div>
      </div>
    </div>`;
  showCard(0);
}

function rm(el){
  if(typeof renderMathInElement==='undefined') return;
  try{renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}catch(e){}
}

function showCard(i){
  flipped=false;
  const c=document.getElementById('C');
  if(c) c.classList.remove('flipped');
  document.getElementById('ctrlRow').style.visibility='hidden';
  document.getElementById('tapHint').style.opacity='1';

  const fc=cards[i];
  const ft=document.getElementById('FT');
  const bt=document.getElementById('BT');
  if(!ft||!bt) return;
  ft.textContent=fc.f; bt.textContent=fc.b;
  rm(ft); rm(bt);

  const pct=(i/cards.length)*100;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pCount').textContent=(i+1)+' / '+cards.length;
  document.getElementById('sOk').textContent='✓ '+ok;
  document.getElementById('sNo').textContent='✗ '+fail;
}

function flip(){
  flipped=!flipped;
  const c=document.getElementById('C');
  if(c) c.classList.toggle('flipped',flipped);
  if(flipped){
    document.getElementById('tapHint').style.opacity='0';
    setTimeout(()=>{ document.getElementById('ctrlRow').style.visibility='visible'; },280);
  } else {
    document.getElementById('ctrlRow').style.visibility='hidden';
    document.getElementById('tapHint').style.opacity='1';
  }
}

function answer(wasOk){
  if(wasOk) ok++; else fail++;
  const next=cur+1;
  if(next>=cards.length){ showResult(); return; }
  cur=next; showCard(cur);
}

function showResult(){
  document.getElementById('cardArea').innerHTML='';
  document.getElementById('bottomArea').style.display='none';
  document.getElementById('pFill').style.width='100%';
  document.getElementById('pCount').textContent=cards.length+' / '+cards.length;
  document.getElementById('sOk').textContent='✓ '+ok;
  document.getElementById('sNo').textContent='✗ '+fail;
  const pct=Math.round((ok/cards.length)*100);
  document.getElementById('rPct').textContent=pct+'%';
  const m=['Nie poddawaj się — wróć i powtórz!','Dobry start! Ćwicz więcej.','Nieźle! Jeszcze trochę.','Świetnie! Prawie perfekcja.','Doskonale! Temat opanowany.'];
  document.getElementById('rMsg').textContent=m[Math.min(4,Math.floor(pct/20))];
  document.getElementById('resultArea').classList.add('show');
}

function restart(){ showCards(); }
generate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiszki AI — Eduvia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root{
  --bg:#07070d;--s1:#0f0f18;--s2:#161622;--s3:#1c1c2e;
  --border:rgba(255,255,255,0.06);--border-hi:rgba(255,255,255,0.11);
  --accent:#7c6aff;--accent2:#a78bfa;--ag:rgba(124,106,255,0.3);
  --green:#22d3a0;--gg:rgba(34,211,160,0.3);
  --gold:#f5a623;--blue:#38bdf8;--red:#f87171;
  --text:#eeeef5;--muted:#55556a;--muted2:#8888a0;
  --h:'Syne',sans-serif;--b:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--b);overflow:hidden;}

/* Aurora */
.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.ab{position:absolute;border-radius:50%;filter:blur(110px);animation:afloat 14s ease-in-out infinite;}
.a1{width:650px;height:650px;background:radial-gradient(circle,rgba(124,106,255,0.18),transparent 70%);top:-200px;right:-80px;}
.a2{width:480px;height:480px;background:radial-gradient(circle,rgba(34,211,160,0.09),transparent 70%);bottom:-80px;left:-80px;animation-delay:5s;}
.a3{width:320px;height:320px;background:radial-gradient(circle,rgba(56,189,248,0.07),transparent 70%);top:40%;left:35%;animation-delay:9s;}
@keyframes afloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(25px,-25px) scale(1.06);}66%{transform:translate(-18px,18px) scale(0.94);}}
body::after{content:'';position:fixed;inset:0;opacity:0.5;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1;}

/* LAYOUT */
.app{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:10px;background:transparent;border:1px solid var(--border-hi);color:var(--muted2);font-size:.75em;font-family:var(--h);font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;}
.back-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2);background:var(--s2);}
.back-btn svg{width:13px;height:13px;}
.topbar-title{font-family:var(--h);font-size:.95em;font-weight:800;color:var(--text);}
.topbar-topic{font-size:.75em;color:var(--muted2);font-weight:400;}
.model-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9px;background:rgba(124,106,255,0.08);border:1px solid rgba(124,106,255,0.2);font-size:.73em;font-family:var(--h);font-weight:700;color:var(--accent2);}
.model-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:mdot 2s ease-in-out infinite;}
@keyframes mdot{0%,100%{opacity:1;}50%{opacity:.4;}}

/* MAIN */
.main{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 20px 16px;gap:20px;overflow:hidden;}

/* PROGRESS */
.progress-wrap{width:100%;max-width:500px;display:flex;flex-direction:column;gap:8px;}
.progress-bar{height:2px;background:var(--border);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.progress-row{display:flex;justify-content:space-between;align-items:center;}
.progress-count{font-family:var(--h);font-size:.72em;font-weight:700;color:var(--muted2);}
.score-row{display:flex;gap:12px;}
.sc{font-size:.72em;font-family:var(--h);font-weight:700;}
.sc-ok{color:var(--green);}
.sc-no{color:var(--red);}

/* CARD 3D */
.card-scene{width:100%;max-width:500px;perspective:1000px;cursor:pointer;user-select:none;}
.card{position:relative;width:100%;min-height:220px;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);}
.card.flipped{transform:rotateY(180deg);}
.card-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:20px;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:28px 24px;gap:14px;text-align:center;
  min-height:220px;
}
.card-front{
  background:linear-gradient(135deg,rgba(22,22,40,0.95),rgba(15,15,28,0.95));
  border:1px solid rgba(124,106,255,0.2);
  box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
}
.card-back{
  background:linear-gradient(135deg,rgba(10,22,18,0.95),rgba(8,18,14,0.95));
  border:1px solid rgba(34,211,160,0.2);
  box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
  transform:rotateY(180deg);
}
.card-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;
  font-family:var(--h);font-size:.62em;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
}
.card-front .card-badge{background:rgba(124,106,255,.12);border:1px solid rgba(124,106,255,.2);color:var(--accent2);}
.card-back .card-badge{background:rgba(34,211,160,.1);border:1px solid rgba(34,211,160,.18);color:var(--green);}
.card-text{font-size:1em;line-height:1.6;color:var(--text);font-weight:400;max-width:380px;}
.card-hint{font-size:.7em;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:4px;}
.card-hint svg{width:12px;height:12px;opacity:.5;}

/* CONTROLS */
.controls{display:flex;gap:10px;width:100%;max-width:500px;}
.ctrl-btn{
  flex:1;padding:13px 10px;
  border-radius:14px;
  font-family:var(--h);font-size:.76em;font-weight:700;
  cursor:pointer;border:none;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .2s;
}
.ctrl-btn svg{width:16px;height:16px;flex-shrink:0;}
.btn-wrong{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red);}
.btn-wrong:hover{background:rgba(248,113,113,.15);transform:translateY(-1px);}
.btn-right{background:rgba(34,211,160,.08);border:1px solid rgba(34,211,160,.2);color:var(--green);}
.btn-right:hover{background:rgba(34,211,160,.15);transform:translateY(-1px);}

/* RESULT */
.result-wrap{
  width:100%;max-width:500px;
  display:none;flex-direction:column;align-items:center;gap:20px;
  animation:fadeIn .4s ease;
}
.result-wrap.show{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.result-circle{
  width:100px;height:100px;border-radius:50%;
  background:linear-gradient(135deg,rgba(124,106,255,.15),rgba(34,211,160,.08));
  border:1px solid rgba(124,106,255,.25);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 0 40px rgba(124,106,255,.15);
}
.result-pct{font-family:var(--h);font-size:1.8em;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.result-pct-label{font-size:.6em;color:var(--muted2);font-family:var(--h);font-weight:700;letter-spacing:.08em;}
.result-msg{font-size:.88em;color:var(--muted2);text-align:center;max-width:320px;line-height:1.6;}
.result-btns{display:flex;gap:10px;width:100%;}
.res-btn{
  flex:1;padding:12px;border-radius:12px;
  font-family:var(--h);font-size:.76em;font-weight:700;
  cursor:pointer;border:none;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  text-decoration:none;
}
.res-btn svg{width:14px;height:14px;}
.res-btn-primary{background:rgba(124,106,255,.1);border:1px solid rgba(124,106,255,.25);color:var(--accent2);}
.res-btn-primary:hover{background:rgba(124,106,255,.18);}
.res-btn-secondary{background:transparent;border:1px solid var(--border-hi);color:var(--muted2);}
.res-btn-secondary:hover{border-color:rgba(255,255,255,.2);color:var(--text);}

/* LOADING */
.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px;}
.spinner{width:36px;height:36px;border:2px solid var(--border-hi);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-family:var(--h);font-size:.78em;font-weight:700;color:var(--muted2);}

/* FLIP anim */
@keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.card-scene{animation:cardIn .35s cubic-bezier(.34,1.2,.64,1);}
</style>
</head>
<body>
<div class="aurora"><div class="ab a1"></div><div class="ab a2"></div><div class="ab a3"></div></div>

<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <a href="chat.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Wróć
      </a>
      <div>
        <div class="topbar-title">Fiszki AI</div>
        <div class="topbar-topic" id="topicLabel"></div>
      </div>
    </div>
    <div class="model-badge"><div class="model-dot"></div>Eduvia AI</div>
  </div>

  <div class="main" id="mainArea">
    <div class="loading-wrap" id="loadingState">
      <div class="spinner"></div>
      <div class="loading-txt">Generuję fiszki...</div>
    </div>
  </div>
</div>

<script>
const BASE = window.location.origin;
let cards = [], cur = 0, ok = 0, fail = 0, flipped = false;

const params = new URLSearchParams(window.location.search);
const topic = params.get('topic') || localStorage.getItem('fc_topic') || '';
const level = params.get('level') || localStorage.getItem('fc_level') || 'liceum';
const subject = params.get('subject') || localStorage.getItem('fc_subject') || 'matematyka';

document.getElementById('topicLabel').textContent = topic || 'Fiszki';

async function generate(){
  try{
    const resp = await fetch(BASE+'/api/v1/quiz/generate-topic',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        topic: topic || 'ogólne',
        subject: subject,
        level: level,
        num_questions: 10,
        difficulty: 'medium',
        wlasne_instrukcje: `Wygeneruj FISZKI (nie quiz). Każde "pytanie" to krótkie pojęcie/termin/wzór do zapamiętania (max 1 zdanie), a "wyjaśnienie" to definicja/odpowiedź (max 2 zdania). Opcje A/B/C/D mogą być identyczne - nie są używane. Format fiszki: front=pytanie, back=wyjaśnienie.`
      })
    });
    const data = await resp.json();
    if(!data.success) throw new Error(data.error);
    cards = data.quiz.questions.map(q=>({front:q.question, back:q.explanation}));
    render();
  }catch(e){
    document.getElementById('mainArea').innerHTML = `<div style="color:var(--red);font-size:.85em;text-align:center;padding:40px">Błąd generowania. <br><a href="chat.html" style="color:var(--accent2)">Wróć do czatu</a></div>`;
  }
}

function render(){
  cur=0; ok=0; fail=0; flipped=false;
  const area = document.getElementById('mainArea');
  area.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
      <div class="progress-row">
        <div class="progress-count" id="pCount">1 / ${cards.length}</div>
        <div class="score-row">
          <div class="sc sc-ok" id="sOk">✓ 0</div>
          <div class="sc sc-no" id="sNo">✗ 0</div>
        </div>
      </div>
    </div>

    <div class="card-scene" id="cardScene" onclick="flip()">
      <div class="card" id="theCard">
        <div class="card-face card-front">
          <div class="card-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
            Pytanie
          </div>
          <div class="card-text" id="frontTxt"></div>
          <div class="card-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10"/></svg>
            Kliknij aby odwrócić
          </div>
        </div>
        <div class="card-face card-back">
          <div class="card-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><polyline points="20 6 9 17 4 12"/></svg>
            Odpowiedź
          </div>
          <div class="card-text" id="backTxt"></div>
          <div class="card-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10"/></svg>
            Jak ci poszło?
          </div>
        </div>
      </div>
    </div>

    <div class="controls" id="ctrlRow" style="display:none">
      <button class="ctrl-btn btn-wrong" onclick="answer(false)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Nie wiedziałem
      </button>
      <button class="ctrl-btn btn-right" onclick="answer(true)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Wiedziałem
      </button>
    </div>

    <div class="result-wrap" id="resultWrap">
      <div class="result-circle">
        <div class="result-pct" id="rPct">0%</div>
        <div class="result-pct-label">wynik</div>
      </div>
      <div class="result-msg" id="rMsg"></div>
      <div class="result-btns">
        <button class="res-btn res-btn-primary" onclick="render()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10"/></svg>
          Powtórz
        </button>
        <a href="chat.html" class="res-btn res-btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Wróć do chatu
        </a>
      </div>
    </div>
  `;
  showCard(0);
}

function renderMath(el){
  if(typeof renderMathInElement==='undefined') return;
  try{ renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false}); }catch(e){}
}

function showCard(i){
  flipped=false;
  document.getElementById('theCard').classList.remove('flipped');
  document.getElementById('ctrlRow').style.display='none';
  document.getElementById('resultWrap').classList.remove('show');
  document.getElementById('cardScene').style.display='';

  const c=cards[i];
  const fEl=document.getElementById('frontTxt');
  const bEl=document.getElementById('backTxt');
  fEl.textContent=c.front;
  bEl.textContent=c.back;
  renderMath(fEl); renderMath(bEl);

  const pct=(i/cards.length)*100;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pCount').textContent=(i+1)+' / '+cards.length;
  document.getElementById('sOk').textContent='✓ '+ok;
  document.getElementById('sNo').textContent='✗ '+fail;
}

function flip(){
  flipped=!flipped;
  document.getElementById('theCard').classList.toggle('flipped',flipped);
  if(flipped) setTimeout(()=>{ document.getElementById('ctrlRow').style.display='flex'; },320);
  else document.getElementById('ctrlRow').style.display='none';
}

function answer(wasOk){
  if(wasOk) ok++; else fail++;
  const next=cur+1;
  if(next>=cards.length){ showResult(); return; }
  cur=next;
  showCard(cur);
}

function showResult(){
  document.getElementById('cardScene').style.display='none';
  document.getElementById('ctrlRow').style.display='none';
  document.getElementById('pFill').style.width='100%';
  document.getElementById('pCount').textContent=cards.length+' / '+cards.length;
  document.getElementById('sOk').textContent='✓ '+ok;
  document.getElementById('sNo').textContent='✗ '+fail;

  const pct=Math.round((ok/cards.length)*100);
  document.getElementById('rPct').textContent=pct+'%';
  const msgs=['Jeszcze trochę pracy przed tobą — nie poddawaj się!','Dobry start! Powtórz kilka razy.','Nieźle! Zostało trochę do opanowania.','Świetnie! Znasz ten temat bardzo dobrze.','Perfekcja! Doskonale opanowany temat.'];
  document.getElementById('rMsg').textContent=msgs[Math.min(4,Math.floor(pct/20))];
  document.getElementById('resultWrap').classList.add('show');
}

generate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eduvia — Quiz AI</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7c6aff">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root{
  --bg:#07070d;--s1:#0f0f18;--s2:#161622;--s3:#1c1c2e;
  --border:rgba(255,255,255,0.06);--border-hi:rgba(255,255,255,0.11);
  --accent:#7c6aff;--accent2:#a78bfa;--ag:rgba(124,106,255,0.3);
  --green:#22d3a0;--gg:rgba(34,211,160,0.3);
  --gold:#f5a623;--blue:#38bdf8;--pink:#f472b6;--red:#f87171;
  --text:#eeeef5;--muted:#55556a;--muted2:#8888a0;
  --h:'Syne',sans-serif;--b:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:var(--b);background:var(--bg);color:var(--text);display:flex;min-height:100vh;cursor:none;}

/* ═══ CURSOR ═══ */
.cursor{position:fixed;width:10px;height:10px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .15s,height .15s,background .15s;box-shadow:0 0 12px var(--ag);}
.cursor-ring{position:fixed;width:32px;height:32px;border:1.5px solid rgba(124,106,255,.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .08s linear,width .2s,height .2s;}

/* ═══ AURORA ═══ */
.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.ab{position:absolute;border-radius:50%;filter:blur(110px);animation:afloat 14s ease-in-out infinite;}
.a1{width:600px;height:600px;background:radial-gradient(circle,rgba(124,106,255,.18),transparent 70%);top:-180px;right:-60px;}
.a2{width:440px;height:440px;background:radial-gradient(circle,rgba(34,211,160,.09),transparent 70%);bottom:-60px;left:-60px;animation-delay:5s;}
.a3{width:320px;height:320px;background:radial-gradient(circle,rgba(56,189,248,.07),transparent 70%);top:40%;left:35%;animation-delay:9s;}
@keyframes afloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-25px) scale(1.06)}66%{transform:translate(-18px,18px) scale(.94)}}
body::after{content:'';position:fixed;inset:0;opacity:.5;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1;}

/* ═══ APP LAYOUT ═══ */
.app{display:flex;width:100%;min-height:100vh;position:relative;z-index:2;}

/* ═══ MOBILE HEADER ═══ */
@keyframes shimmer{0%{background-position:0% center}50%{background-position:100% center}100%{background-position:0% center}}
@keyframes logoPulse{0%,100%{box-shadow:0 0 10px rgba(124,106,255,.4)}50%{box-shadow:0 0 22px rgba(124,106,255,.7)}}
.m-hdr{display:none;position:fixed;top:0;left:0;right:0;height:56px;padding:0 12px 0 14px;background:rgba(7,7,13,.98);backdrop-filter:blur(20px);border-bottom:1px solid rgba(124,106,255,.15);z-index:9000;align-items:center;gap:10px;box-shadow:0 2px 20px rgba(0,0,0,.4);}
.m-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#7c6aff,#4f3fcf);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--h);font-weight:800;font-size:.95em;color:white;animation:logoPulse 3s ease-in-out infinite;}
.m-hdr-info{flex:1;min-width:0;}
.m-hdr-title{font-family:var(--h);font-size:.88em;font-weight:800;background:linear-gradient(90deg,#e8e4ff 0%,#a78bfa 30%,#7c6aff 50%,#38bdf8 70%,#22d3a0 90%,#a78bfa 100%);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 6s ease-in-out infinite;}
.m-hdr-sub{font-size:.6em;color:var(--muted);margin-top:1px;}
.m-burger{width:36px;height:36px;border-radius:8px;background:rgba(124,106,255,.1);border:1px solid rgba(124,106,255,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;flex-shrink:0;}
.m-burger span{width:16px;height:1.5px;background:#a78bfa;border-radius:2px;transition:.2s;}
.m-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9100;}
.m-overlay.open{display:block;}
.m-drawer{position:fixed;top:0;left:0;bottom:0;width:270px;background:linear-gradient(180deg,#0a0a16,#070710);border-right:1px solid rgba(124,106,255,.12);z-index:9200;transform:translateX(-100%);transition:transform .25s ease;padding:20px 12px;overflow-y:auto;}
.m-drawer.open{transform:translateX(0);}
.d-brand{display:flex;align-items:center;gap:10px;padding:8px 4px 20px;}
.d-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#7c6aff,#4f3fcf);display:flex;align-items:center;justify-content:center;font-family:var(--h);font-weight:800;color:white;font-size:.9em;}
.d-brand-name{font-family:var(--h);font-size:.9em;font-weight:800;color:white;}
.d-brand-sub{font-size:.65em;color:var(--muted);margin-top:1px;}
.d-sec{font-family:var(--h);font-size:.55em;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:8px 8px 5px;}
.d-link{display:flex;align-items:center;gap:9px;padding:10px;border-radius:10px;font-size:.82em;color:var(--muted2);text-decoration:none;border:1px solid transparent;margin-bottom:2px;transition:.18s;cursor:pointer;}
.d-link.active,.d-link:hover{background:rgba(124,106,255,.1);border-color:rgba(124,106,255,.2);color:#a78bfa;}
.m-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;grid-template-columns:repeat(5,1fr);background:rgba(7,7,13,.98);border-top:1px solid rgba(124,106,255,.12);z-index:9000;box-shadow:0 -2px 20px rgba(0,0,0,.4);}
.m-nb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:.6em;color:var(--muted);text-decoration:none;position:relative;transition:.18s;cursor:pointer;}
.m-nb.active{color:#a78bfa;}
.m-nb-dot{position:absolute;top:6px;width:4px;height:4px;border-radius:50%;background:#7c6aff;}

/* ═══ SIDEBAR ═══ */
.sidebar{width:220px;flex-shrink:0;background:linear-gradient(180deg,rgba(15,15,24,.98),rgba(7,7,13,.98));border-right:1px solid var(--border-hi);padding:22px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(124,106,255,.5) 50%,transparent);}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 22px;}
.brand-logo{width:36px;height:36px;border-radius:11px;flex-shrink:0;background:linear-gradient(135deg,#7c6aff,#4f3fcf);display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(124,106,255,.45),inset 0 1px 0 rgba(255,255,255,.2);position:relative;overflow:hidden;}
.brand-logo::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);pointer-events:none;}
.brand-l{font-family:var(--h);font-size:1.1em;font-weight:800;color:white;}
.brand-text{display:flex;flex-direction:column;}
.brand-name{font-family:var(--h);font-size:1em;font-weight:800;letter-spacing:-.02em;line-height:1;}
.brand-sub{font-size:.6em;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.ng{font-family:var(--h);font-size:.58em;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:14px 8px 5px;}
.nl{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;font-size:.82em;color:var(--muted2);cursor:pointer;transition:all .2s;border:1px solid transparent;position:relative;margin-bottom:1px;text-decoration:none;}
.nl svg{width:15px;height:15px;flex-shrink:0;opacity:.7;transition:opacity .2s;}
.nl:hover{color:var(--text);background:var(--s2);}
.nl:hover svg{opacity:1;}
.nl.active{color:#fff;background:linear-gradient(135deg,rgba(124,106,255,.15),rgba(124,106,255,.05));border-color:rgba(124,106,255,.25);}
.nl.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2.5px;background:var(--accent);border-radius:0 3px 3px 0;box-shadow:0 0 10px var(--accent);}
.nl.active svg{opacity:1;}
.sb-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);}
.xp-wrap{padding:12px;background:var(--s2);border-radius:12px;border:1px solid var(--border-hi);}
.xp-top{display:flex;justify-content:space-between;margin-bottom:7px;}
.xp-lv{font-family:var(--h);font-size:.72em;font-weight:700;color:var(--gold);}
.xp-pts{font-size:.67em;color:var(--muted);}
.xp-track{height:4px;background:var(--s3);border-radius:100px;overflow:hidden;}
.xp-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:100px;position:relative;overflow:hidden;transition:width .6s ease;}
.xp-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:scan 2.5s linear infinite;}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
.xp-sub{font-size:.64em;color:var(--muted);margin-top:4px;text-align:right;}

/* ═══ MAIN CONTENT ═══ */
.main{flex:1;overflow-y:auto;padding:28px 30px;display:flex;flex-direction:column;gap:0;}
.main::-webkit-scrollbar{width:3px;}
.main::-webkit-scrollbar-thumb{background:var(--s3);border-radius:100px;}

/* ═══ PAGE TOPBAR ═══ */
.page-topbar{display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;margin-bottom:24px;}
.page-label{font-family:var(--h);font-size:.6em;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.page-h1{font-family:var(--h);font-size:1.9em;font-weight:800;letter-spacing:-.03em;line-height:1.05;}
.page-h1 span{background:linear-gradient(110deg,#fff,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200%;animation:gradMove 4s ease infinite;}
@keyframes gradMove{0%,100%{background-position:0%}50%{background-position:100%}}
.page-sub{font-size:.82em;color:var(--muted2);margin-top:4px;font-weight:300;}
.page-badge{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:rgba(124,106,255,.08);border:1px solid rgba(124,106,255,.2);border-radius:100px;font-family:var(--h);font-size:.72em;font-weight:700;color:var(--accent2);letter-spacing:.06em;text-transform:uppercase;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--gg);animation:blink 2s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ═══ QUIZ INNER PAGES ═══ */
.page{display:none;animation:pageIn .35s cubic-bezier(.34,1.1,.64,1);}
.page.active{display:block;}
@keyframes pageIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* ═══ LAYOUT: SETUP ═══ */
.setup-layout{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start;}
.card{background:var(--s1);border:1px solid var(--border-hi);border-radius:20px;padding:28px;box-shadow:0 0 0 1px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.03);}
.field{margin-bottom:18px;}
.field-label{font-family:var(--h);font-size:.68em;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:block;}
.input-wrap input,.input-wrap select{width:100%;padding:13px 15px;background:var(--s2);border:1px solid var(--border-hi);border-radius:12px;color:var(--text);font-family:var(--b);font-size:.92em;outline:none;transition:all .25s;}
.input-wrap input:focus,.input-wrap select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,255,.1);}
.input-wrap select option{background:#131320;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.sel-btn{padding:11px 7px;background:var(--s2);border:1px solid var(--border);border-radius:11px;color:var(--muted2);font-family:var(--h);font-size:.78em;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;}
.sel-btn:hover{border-color:var(--border-hi);color:var(--text);}
.sel-btn.active{background:rgba(124,106,255,.12);border-color:rgba(124,106,255,.4);color:var(--accent2);}
.sel-btn .dot{display:block;width:8px;height:8px;border-radius:50%;margin:0 auto 5px;transition:transform .2s;}
.sel-btn:hover .dot,.sel-btn.active .dot{transform:scale(1.3);}
.dot-easy{background:#22d3a0;}.dot-med{background:#f5a623;}.dot-hard{background:#f87171;}
.start-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#5040c8);border:none;border-radius:13px;color:white;font-family:var(--h);font-size:.9em;font-weight:700;cursor:pointer;transition:all .25s;margin-top:4px;box-shadow:0 6px 24px rgba(124,106,255,.3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:8px;}
.start-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 50%);}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(124,106,255,.45);}
.start-btn svg{width:16px;height:16px;stroke:white;flex-shrink:0;}
.error-msg{display:none;margin-top:12px;padding:11px 15px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;color:var(--red);font-size:.86em;}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border-hi);border-radius:13px;padding:22px 16px;text-align:center;cursor:pointer;transition:all .25s;}
.upload-zone:hover{border-color:rgba(124,106,255,.4);background:rgba(124,106,255,.03);}
.upload-icon{width:42px;height:42px;border-radius:12px;background:rgba(124,106,255,.1);border:1px solid rgba(124,106,255,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;transition:.2s;}
.upload-zone:hover .upload-icon{background:rgba(124,106,255,.18);transform:translateY(-2px);}
.upload-icon svg{width:20px;height:20px;stroke:var(--accent2);}
.slider-wrap{display:flex;align-items:center;gap:14px;}
.slider-wrap input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:5px;outline:none;cursor:pointer;accent-color:var(--accent);background:linear-gradient(90deg,var(--accent) 0%,var(--accent) var(--pct,33%),var(--s3) var(--pct,33%));}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:white;border:3px solid var(--accent);cursor:pointer;box-shadow:0 0 8px rgba(124,106,255,.4);}
.slider-val{font-family:var(--h);font-weight:800;font-size:1.05em;color:var(--accent2);min-width:28px;text-align:right;}

/* ═══ INFO SIDEBAR CARD ═══ */
.info-col{display:flex;flex-direction:column;gap:12px;}
.info-card{background:var(--s1);border:1px solid var(--border-hi);border-radius:18px;padding:20px;}
.info-card-title{font-family:var(--h);font-size:.72em;font-weight:800;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.06em;}
.info-card-title svg{width:14px;height:14px;stroke:var(--accent2);flex-shrink:0;}
.stat-mini{display:flex;gap:8px;}
.sm-item{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center;}
.sm-n{font-family:var(--h);font-size:1.3em;font-weight:800;transition:all .4s;}
.sm-d{font-size:.64em;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em;font-family:var(--h);}
.tip{display:flex;gap:10px;padding:10px 11px;border-radius:11px;margin-bottom:5px;transition:all .2s;border:1px solid transparent;}
.tip:last-child{margin-bottom:0;}
.tip:hover{background:rgba(124,106,255,.04);border-color:rgba(124,106,255,.12);}
.tip-ico{flex-shrink:0;margin-top:2px;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.tip-ico svg{width:13px;height:13px;}
.tip-title{font-family:var(--h);font-size:.73em;font-weight:700;color:var(--accent2);margin-bottom:2px;}
.tip-body{font-size:.71em;color:var(--muted2);line-height:1.55;}
.empty-recent{text-align:center;padding:18px 0;color:var(--muted);font-size:.8em;}
.recent-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.recent-item:last-child{border:none;}
.ri-icon{width:30px;height:30px;border-radius:8px;flex-shrink:0;background:rgba(124,106,255,.08);border:1px solid rgba(124,106,255,.15);display:flex;align-items:center;justify-content:center;}
.ri-icon svg{width:13px;height:13px;stroke:var(--accent2);}
.ri-name{font-size:.81em;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ri-meta{font-size:.69em;color:var(--muted);font-family:var(--h);flex-shrink:0;}

/* ═══ LOADING PAGE ═══ */
.loading-card{text-align:center;padding:52px 28px;}
.spinner{width:48px;height:48px;border:3px solid var(--border-hi);border-top-color:var(--accent);border-radius:50%;animation:spin .85s linear infinite;margin:0 auto 18px;}
.loading-card h3{font-family:var(--h);font-size:1.05em;margin-bottom:7px;}
.loading-card p{color:var(--muted2);font-size:.87em;}

/* ═══ QUIZ PAGE ═══ */
.quiz-layout{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start;}
.quiz-col{}
.quiz-header{margin-bottom:16px;}
.quiz-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.quiz-title{font-family:var(--h);font-weight:700;font-size:.95em;color:var(--accent2);}
.xp-badge{display:flex;align-items:center;gap:5px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);border-radius:100px;padding:4px 11px;font-family:var(--h);font-size:.78em;font-weight:700;color:var(--gold);}
.progress-bar{height:5px;background:var(--s2);border-radius:100px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:100px;transition:width .5s ease;}
.progress-text{display:flex;justify-content:space-between;font-size:.75em;color:var(--muted2);margin-top:5px;}
.question-card{background:var(--s1);border:1px solid var(--border-hi);border-radius:20px;padding:24px;box-shadow:0 0 0 1px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.03);}
.question-nr{font-family:var(--h);font-size:.72em;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;}
.question-text{font-size:1.05em;font-weight:500;line-height:1.7;margin-bottom:20px;color:var(--text);}
.options{display:flex;flex-direction:column;gap:9px;margin-bottom:18px;}
.option{padding:14px 18px;border-radius:13px;border:1px solid var(--border-hi);background:var(--s2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:13px;line-height:1.5;}
.option:hover:not(.locked){border-color:var(--accent);background:rgba(124,106,255,.08);transform:translateX(4px);}
.opt-letter{width:27px;height:27px;min-width:27px;border-radius:7px;background:var(--s3);border:1px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-family:var(--h);font-size:.78em;font-weight:700;transition:all .2s;color:var(--muted2);}
.option.correct{border-color:var(--green);background:rgba(34,211,160,.07);animation:correctPop .35s ease;}
.option.correct .opt-letter{background:var(--green);color:#030f0a;border-color:var(--green);}
.option.wrong{border-color:var(--red);background:rgba(248,113,113,.07);animation:wrongShake .35s ease;}
.option.wrong .opt-letter{background:var(--red);color:white;border-color:var(--red);}
.option.locked{cursor:default;}.option.dim{opacity:.35;}
.feedback-box{display:none;border-radius:13px;padding:14px 18px;margin-bottom:16px;border:1px solid;}
.feedback-box.show{display:block;animation:fadeUp .25s ease;}
.feedback-box.correct-fb{border-color:rgba(34,211,160,.28);background:rgba(34,211,160,.05);}
.feedback-box.wrong-fb{border-color:rgba(248,113,113,.28);background:rgba(248,113,113,.05);}
.feedback-header{font-family:var(--h);font-weight:700;font-size:.87em;margin-bottom:7px;}
.correct-h{color:var(--green);}.wrong-h{color:var(--red);}
.feedback-explain{font-size:.85em;line-height:1.7;color:var(--text);}
.feedback-motivation{margin-top:7px;font-size:.8em;color:var(--muted2);font-style:italic;}
.xp-pop{display:none;font-family:var(--h);font-weight:800;font-size:.95em;color:var(--gold);text-align:right;}
.next-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#5040c8);border:none;border-radius:13px;color:white;font-family:var(--h);font-size:.92em;font-weight:700;cursor:pointer;transition:all .25s;display:none;box-shadow:0 4px 16px rgba(124,106,255,.25);}
.next-btn.show{display:block;animation:fadeUp .25s ease;}
.next-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,106,255,.4);}
.retry-banner{display:flex;align-items:center;gap:9px;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.18);border-radius:11px;padding:11px 15px;margin-bottom:18px;font-size:.86em;}
.retry-banner strong{color:var(--red);font-family:var(--h);}

/* QUIZ INFO SIDEBAR */
.quiz-info-card{background:var(--s1);border:1px solid var(--border-hi);border-radius:18px;padding:18px;}
.quiz-info-title{font-family:var(--h);font-size:.68em;font-weight:800;margin-bottom:12px;color:var(--text);display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.06em;}
.quiz-info-title svg{width:13px;height:13px;stroke:var(--accent2);}
.qi-stat{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.82em;}
.qi-stat:last-child{border:none;}
.qi-label{color:var(--muted2);}
.qi-val{font-family:var(--h);font-weight:700;}

/* ═══ RESULTS ═══ */
.results-layout{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start;}
.results-card{background:var(--s1);border:1px solid var(--border-hi);border-radius:20px;padding:28px;}
.results-header{text-align:center;margin-bottom:24px;}
.score-circle{width:110px;height:110px;border-radius:50%;border:3px solid var(--accent);margin:0 auto 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(124,106,255,.08);box-shadow:0 0 32px rgba(124,106,255,.2);}
.score-pct{font-family:var(--h);font-size:1.9em;font-weight:800;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.score-label{font-size:.68em;color:var(--muted2);}
.results-title{font-family:var(--h);font-size:1.35em;font-weight:800;margin-bottom:5px;}
.results-sub{color:var(--muted2);font-size:.86em;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:22px;}
.stat-box{background:var(--s2);border:1px solid var(--border);border-radius:13px;padding:14px;text-align:center;}
.stat-val{font-family:var(--h);font-size:1.35em;font-weight:800;}
.stat-val.green{color:var(--green);}.stat-val.red{color:var(--red);}.stat-val.gold{color:var(--gold);}
.stat-lbl{font-size:.72em;color:var(--muted2);margin-top:3px;}
.results-btns{display:flex;flex-direction:column;gap:9px;}
.btn-primary{padding:14px;background:linear-gradient(135deg,var(--accent),#5040c8);border:none;border-radius:13px;color:white;font-family:var(--h);font-weight:700;font-size:.92em;cursor:pointer;transition:all .25s;box-shadow:0 4px 16px rgba(124,106,255,.25);}
.btn-primary:hover{transform:translateY(-1px);}
.btn-secondary{padding:12px;background:transparent;border:1px solid var(--border-hi);border-radius:12px;color:var(--muted2);font-family:var(--b);font-size:.88em;cursor:pointer;transition:all .2s;}
.btn-secondary:hover{border-color:rgba(124,106,255,.3);color:var(--text);}
.btn-retry{padding:14px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.22);border-radius:13px;color:var(--red);font-family:var(--h);font-weight:700;font-size:.92em;cursor:pointer;}

/* ═══ REVIEW ═══ */
.review-card{background:var(--s1);border:1px solid var(--border-hi);border-radius:16px;padding:18px;margin-bottom:10px;}

/* KaTeX */
.katex{font-size:1.08em!important;color:var(--text);}
.katex-display{margin:.5em 0!important;overflow-x:auto;text-align:center;}
.question-text .katex{font-size:1.1em!important;}
.option .katex{font-size:1em!important;vertical-align:middle;}
.feedback-explain .katex{font-size:1em!important;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.015)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.confetti-piece{position:fixed;width:7px;height:7px;border-radius:2px;pointer-events:none;z-index:1000;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* ═══ MOBILE ═══ */
@media(max-width:768px){
  .cursor,.cursor-ring{display:none!important;}
  body{cursor:auto;}
  .sidebar{display:none!important;}
  .app{display:block;}

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Eduvia — AI Tablica</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c6aff">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#07070d;--s1:#0f0f18;--s2:#161622;--s3:#1c1c2e;
  --border:rgba(255,255,255,.06);--border-hi:rgba(255,255,255,.1);
  --accent:#7c6aff;--accent2:#a78bfa;--green:#22d3a0;--red:#f87171;--gold:#f5a623;
  --text:#eeeef5;--muted:#55556a;--muted2:#8888a0;
  --h:'Syne',sans-serif;--b:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--b);overflow:hidden;}

/* AURORA */
.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.ab{position:absolute;border-radius:50%;filter:blur(120px);animation:afloat 14s ease-in-out infinite;}
.a1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,106,255,.12),transparent 70%);top:-150px;right:-100px;}
.a2{width:400px;height:400px;background:radial-gradient(circle,rgba(34,211,160,.07),transparent 70%);bottom:-100px;left:-100px;animation-delay:6s;}
@keyframes afloat{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-20px)}}

/* SETUP SCREEN */
#setupScreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;background:var(--bg);padding:0 16px 100px;overflow-y:auto;}
.setup-top{padding:24px 0 20px;display:flex;align-items:center;gap:12px;}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--s1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted2);flex-shrink:0;}
.setup-title{font-family:var(--h);font-size:1em;font-weight:800;}

.setup-hero{text-align:center;padding:16px 0 28px;}
.setup-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#7c6aff,#4f3fcf);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 40px rgba(124,106,255,.35);}
.setup-hero h1{font-family:var(--h);font-size:1.5em;font-weight:800;margin-bottom:6px;}
.setup-hero p{font-size:.84em;color:var(--muted2);line-height:1.5;}

.card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:12px;}
.inp-label{font-size:.68em;font-weight:700;color:var(--muted2);margin-bottom:7px;font-family:var(--h);letter-spacing:.06em;text-transform:uppercase;}
.inp{width:100%;background:var(--s2);border:1px solid var(--border-hi);border-radius:12px;padding:13px 15px;color:var(--text);font-size:.9em;font-family:var(--b);outline:none;transition:.2s;}
.inp:focus{border-color:var(--accent);}

/* MODE GRID */
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:0;}
.mode-btn{padding:12px 8px;border-radius:12px;background:var(--s2);border:1.5px solid var(--border);cursor:pointer;text-align:center;transition:.2s;}
.mode-btn.active{background:rgba(124,106,255,.1);border-color:rgba(124,106,255,.35);}
.mode-icon{display:flex;align-items:center;justify-content:center;color:var(--muted2);margin-bottom:5px;}
.mode-btn.active .mode-icon{color:var(--accent2);}
.mode-name{font-family:var(--h);font-size:.68em;font-weight:800;color:var(--text);}
.mode-sub{font-size:.6em;color:var(--muted2);margin-top:2px;}

/* PHOTO */
.photo-row{display:flex;gap:8px;margin-top:10px;}
.photo-btn{flex:1;padding:11px;border-radius:11px;background:var(--s2);border:1px solid var(--border-hi);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-size:.8em;color:var(--muted2);transition:.2s;}
.photo-btn:hover{border-color:var(--accent);color:var(--accent2);}
.photo-added{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(34,211,160,.08);border:1px solid rgba(34,211,160,.2);border-radius:10px;font-size:.75em;color:var(--green);margin-top:8px;}

/* START BTN */
.start-btn{width:100%;padding:16px;background:linear-gradient(135deg,#7c6aff,#5040c8);border:none;border-radius:14px;color:white;font-family:var(--h);font-size:.95em;font-weight:800;cursor:pointer;transition:.2s;box-shadow:0 6px 24px rgba(124,106,255,.3);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.start-btn:hover{transform:translateY(-2px);}
.start-btn:disabled{opacity:.5;transform:none;}

/* LESSON SCREEN */
#lessonScreen{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;background:var(--bg);}

/* LESSON HEADER */
.lesson-hdr{position:absolute;top:0;left:0;right:0;z-index:10;padding:12px 16px;display:flex;align-items:center;gap:10px;background:linear-gradient(to bottom,rgba(7,7,13,.95),transparent);}
.lesson-back{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);flex-shrink:0;}
.lesson-topic{font-family:var(--h);font-size:.85em;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lesson-step-counter{font-size:.68em;color:var(--muted2);font-family:var(--h);font-weight:700;white-space:nowrap;}

/* PROGRESS BAR */
.lesson-progress{position:absolute;top:56px;left:0;right:0;z-index:10;padding:0 16px;}
.progress-track{height:2px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:100px;transition:width .5s ease;}

/* SLIDES CONTAINER */
.slides-wrap{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.slides-wrap::-webkit-scrollbar{display:none;}

/* SINGLE SLIDE */
.slide{height:100vh;scroll-snap-align:start;display:flex;flex-direction:column;padding:72px 16px 90px;position:relative;}
.slide-num{position:absolute;top:72px;right:16px;font-size:.65em;color:var(--muted);font-family:var(--h);font-weight:700;}

/* BOARD - ciemna tablica */
.board{flex:1;background:linear-gradient(135deg,#0a0a14,#0d0d1a);border:1px solid rgba(124,106,255,.15);border-radius:20px;padding:20px 18px;position:relative;overflow:hidden;min-height:300px;}
.board::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(124,106,255,.06),transparent 60%);pointer-events:none;}

/* WRITING ANIMATION */
.board-content{position:relative;z-index:2;}
.board-line{display:block;font-family:var(--b);font-size:.95em;line-height:1.75;color:var(--text);opacity:0;animation:lineAppear .4s ease forwards;}
.board-line.math{font-family:var(--h);font-size:1.1em;color:#a78bfa;font-weight:700;}
.board-line.highlight{color:var(--green);}
.board-line.formula{background:rgba(124,106,255,.08);border-left:3px solid var(--accent);padding:6px 10px;border-radius:0 8px 8px 0;margin:4px 0;}
@keyframes lineAppear{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}

/* CURSOR BLINK */
.cursor-blink{display:inline-block;width:2px;height:1em;background:var(--accent2);border-radius:1px;animation:cursorBlink .7s ease-in-out infinite;vertical-align:text-bottom;margin-left:2px;}
@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}

/* SLIDE BOTTOM */
.slide-bottom{padding-top:12px;}
.slide-tip{font-size:.75em;color:var(--muted2);line-height:1.5;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;}
.slide-tip strong{color:var(--accent2);}

/* CLICK TO EXPLAIN */
.explain-word{cursor:pointer;border-bottom:1px dashed rgba(124,106,255,.4);color:var(--accent2);transition:.15s;}
.explain-word:hover{border-bottom-color:var(--accent2);}

/* EXPLAIN POPUP */
.explain-popup{position:fixed;bottom:90px;left:16px;right:16px;background:linear-gradient(135deg,#0f0f1e,#131320);border:1px solid rgba(124,106,255,.3);border-radius:18px;padding:16px;z-index:500;animation:popUp .3s cubic-bezier(.22,1,.36,1);box-shadow:0 20px 60px rgba(0,0,0,.5);}
@keyframes popUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.explain-popup-title{font-family:var(--h);font-size:.8em;font-weight:800;color:#a78bfa;margin-bottom:6px;}
.explain-popup-text{font-size:.82em;color:var(--text);line-height:1.6;}
.explain-popup-close{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,.06);border:none;cursor:pointer;color:var(--muted2);display:flex;align-items:center;justify-content:center;font-size:.8em;}

/* VOICE INDICATOR */
.voice-indicator{position:fixed;bottom:90px;right:16px;z-index:300;display:none;flex-direction:column;align-items:center;gap:4px;}
.voice-indicator.active{display:flex;}
.voice-bars{display:flex;align-items:flex-end;gap:2px;height:24px;}
.vbar{width:3px;border-radius:2px;background:var(--green);animation:vbarAnim 0.8s ease-in-out infinite;}
.vbar:nth-child(1){height:8px;animation-delay:0s;}
.vbar:nth-child(2){height:16px;animation-delay:.1s;}
.vbar:nth-child(3){height:24px;animation-delay:.2s;}
.vbar:nth-child(4){height:16px;animation-delay:.3s;}
.vbar:nth-child(5){height:8px;animation-delay:.4s;}
@keyframes vbarAnim{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
.voice-lbl{font-size:.55em;color:var(--green);font-family:var(--h);font-weight:700;}

/* BOTTOM CONTROLS */
.lesson-controls{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(to top,rgba(7,7,13,.98),transparent);display:flex;align-items:center;gap:10px;}
.ctrl-btn{height:44px;border-radius:12px;border:1px solid var(--border-hi);background:var(--s1);cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--h);font-size:.75em;font-weight:700;transition:.2s;flex-shrink:0;padding:0 14px;}
.ctrl-btn:active{transform:scale(.95);}
.ctrl-btn.primary{background:linear-gradient(135deg,#7c6aff,#5040c8);border-color:transparent;color:white;flex:1;}
.ctrl-btn.danger{border-color:rgba(248,113,113,.2);color:var(--red);}
.ctrl-voice{width:44px;height:44px;padding:0;}

/* LOADING SCREEN */
#loadingScreen{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:16px;}
.loading-spinner{width:48px;height:48px;border:3px solid rgba(124,106,255,.2);border-top-color:#7c6aff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:var(--h);font-size:1.1em;font-weight:800;}
.loading-sub{font-size:.82em;color:var(--muted2);}

/* PDF BTN */
.pdf-slide{height:100vh;scroll-snap-align:start;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px;}
.pdf-icon{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,rgba(124,106,255,.2),rgba(34,211,160,.1));border:1px solid rgba(124,106,255,.3);display:flex;align-items:center;justify-content:center;}
.pdf-title{font-family:var(--h);font-size:1.3em;font-weight:800;text-align:center;}
.pdf-sub{font-size:.82em;color:var(--muted2);text-align:center;line-height:1.5;}
.pdf-btn{width:100%;max-width:300px;padding:16px;background:linear-gradient(135deg,#7c6aff,#5040c8);border:none;border-radius:14px;color:white;font-family:var(--h);font-size:.95em;font-weight:800;cursor:pointer;box-shadow:0 6px 24px rgba(124,106,255,.3);}
.pdf-btn:active{transform:scale(.97);}
.restart-btn{width:100%;max-width:300px;padding:14px;background:var(--s1);border:1px solid var(--border-hi);border-radius:14px;color:var(--muted2);font-family:var(--h);font-size:.85em;font-weight:700;cursor:pointer;}

/* BOTTOM NAV */
.m-nav{position:fixed;bottom:0;left:0;right:0;height:60px;display:grid;grid-template-columns:repeat(5,1fr);background:rgba(7,7,13,.98);border-top:1px solid rgba(124,106,255,.12);z-index:50;}
.m-nb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:.6em;color:var(--muted);transition:.18s;background:transparent;border:none;cursor:pointer;position:relative;}
.m-nb.active{color:#a78bfa;}
.m-nb-dot{position:absolute;top:6px;width:4px;height:4px;border-radius:50%;background:#7c6aff;}
</style>
</head>
<body>
<div class="aurora"><div class="ab a1"></div><div class="ab a2"></div></div>

<!-- SETUP -->
<div id="setupScreen">
  <div style="position:relative;z-index:2;max-width:480px;margin:0 auto;width:100%;">
    <div class="setup-top">
      <button class="back-btn" onclick="go('dashboard_FINAL.html')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="setup-title">AI Tablica</div>
    </div>

    <div class="setup-hero">
      <div class="setup-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" width="32" height="32"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <h1>AI Tablica</h1>
      <p>Wpisz temat lub wrzuć zdjęcie.<br>AI wyjaśni wszystko krok po kroku.</p>
    </div>

    <div class="card">
      <div class="inp-label">Temat lekcji</div>
      <input class="inp" id="topicInput" placeholder="np. Twierdzenie Pitagorasa, Fotosynteza..." style="margin-bottom:0;">
    </div>

    <div class="card">
      <div class="inp-label">Tryb lekcji</div>
      <div class="mode-grid">
        <div class="mode-btn active" id="mode-krotka" onclick="setMode('krotka')">
          <div class="mode-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div class="mode-name">Krótko</div>
          <div class="mode-sub">~3 min</div>
        </div>
        <div class="mode-btn" id="mode-pelna" onclick="setMode('pelna')">
          <div class="mode-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
          <div class="mode-name">Pełna</div>
          <div class="mode-sub">~8 min</div>
        </div>
        <div class="mode-btn" id="mode-zadania" onclick="setMode('zadania')">
          <div class="mode-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
          <div class="mode-name">Zadania</div>
          <div class="mode-sub">krok po kroku</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="inp-label">Poziom</div>
      <select class="inp" id="levelSelect" style="margin-bottom:0;">
        <option value="podstawowka">Podstawówka</option>
        <option value="liceum" selected>Liceum</option>
        <option value="technikum">Technikum</option>
        <option value="studia">Studia</option>
      </select>
    </div>

    <div class="card">
      <div class="inp-label">Zdjęcie (opcjonalne)</div>
      <div class="photo-row">
        <button class="photo-btn" onclick="takePhoto()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Aparat
        </button>
        <button class="photo-btn" onclick="pickPhoto()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Galeria
        </button>
      </div>
      <div id="photoAdded" style="display:none;" class="photo-added">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>
        Zdjęcie dodane
      </div>
      <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="handlePhoto(event)">
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handlePhoto(event)">
    </div>

    <button class="start-btn" id="startBtn" onclick="startLesson()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="18" height="18"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Rozpocznij lekcję
    </button>
  </div>
</div>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-txt">AI przygotowuje lekcję</div>
  <div class="loading-sub" id="loadingTxt">Analizuję temat...</div>
</div>

<!-- LESSON -->
<div id="lessonScreen">
  <div class="lesson-hdr">
    <button class="lesson-back" onclick="endLesson()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="lesson-topic" id="lessonTopicTitle"></div>
    <div class="lesson-step-counter" id="stepCounter">1 / 1</div>
  </div>

  <div class="lesson-progress">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="slides-wrap" id="slidesWrap"></div>

  <div class="voice-indicator" id="voiceIndicator">
    <div class="voice-bars">
      <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
    </div>
    <div class="voice-lbl">Mówi AI</div>
  </div>

  <div class="lesson-controls">
    <button class="ctrl-btn ctrl-voice" id="voiceBtn" onclick="toggleVoice()" title="Głos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18" id="voiceIcon"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="ctrl-btn" onclick="prevSlide()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="ctrl-btn primary" onclick="nextSlide()" id="nextBtn">
      Dalej
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<nav class="m-nav">
  <button class="m-nb" onclick="go('dashboard_FINAL.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Start</span></button>
  <button class="m-nb" onclick="go('chat.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>Chat</span></button>
  <button class="m-nb" onclick="go('quiz_app.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>Quiz</span></button>
  <button class="m-nb active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span>Tablica</span><span class="m-nb-dot"></span></button>
  <button class="m-nb" onclick="go('settings.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><circle cx="12" cy="12" r="3"/></svg><span>Profil</span></button>
</nav>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

const auth=getAuth(app);
onAuthStateChanged(auth,u=>{if(!u)window.location.href='login.html';});

<script>
const BACKEND = 'https://ai-teacher-backend-1.onrender.com';
let selectedMode = 'krotka';
let photoBase64 = null;
let slides = [];
let currentSlide = 0;
let voiceEnabled = true;
let speaking = false;
let synth = window.speechSynthesis;

function go(u){
  window.speechSynthesis.cancel();
  document.body.style.opacity='0';
  document.body.style.transition='opacity .2s';
  setTimeout(()=>window.location.href=u,200);
}

function setMode(mode){
  selectedMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+mode).classList.add('active');
}

function takePhoto(){document.getElementById('cameraInput').click();}
function pickPhoto(){document.getElementById('photoInput').click();}

function handlePhoto(e){
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = ev => {
    photoBase64 = ev.target.result.split(',')[1];
    document.getElementById('photoAdded').style.display='flex';
  };
  r.readAsDataURL(file);
}

async function startLesson(){
  const topic = document.getElementById('topicInput').value.trim();
  if(!topic && !photoBase64){alert('Wpisz temat lub dodaj zdjęcie!');return;}

  document.getElementById('setupScreen').style.display='none';
  document.getElementById('loadingScreen').style.display='flex';

  const loadingMsgs = ['Analizuję temat...','Przygotowuję wyjaśnienia...','Tworzę kroki lekcji...','Prawie gotowe...'];
  let mi = 0;
  const loadingInterval = setInterval(()=>{
    document.getElementById('loadingTxt').textContent = loadingMsgs[mi%loadingMsgs.length];
    mi++;
  }, 1500);

  try {
    const res = await fetch(BACKEND+'/api/v1/whiteboard/lesson', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        topic: topic || 'Rozwiąż zadanie ze zdjęcia',
        mode: selectedMode,
        level: document.getElementById('levelSelect').value,
        image: photoBase64 || null
      })
    });

    if(!res.ok) throw new Error('Błąd serwera');
    const data = await res.json();
    slides = data.slides || [];

    clearInterval(loadingInterval);
    document.getElementById('loadingScreen').style.display='none';
    buildLesson(topic || 'Lekcja AI');

  } catch(e){
    clearInterval(loadingInterval);
    alert('Błąd generowania lekcji. Spróbuj ponownie.');
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('setupScreen').style.display='block';
  }
}

function buildLesson(topic){
  document.getElementById('lessonTopicTitle').textContent = topic;
  document.getElementById('lessonScreen').style.display='flex';
  currentSlide = 0;

  const wrap = document.getElementById('slidesWrap');
  wrap.innerHTML = '';

  slides.forEach((slide, i) => {
    const div = document.createElement('div');
    div.className = 'slide';
    div.id = 'slide-'+i;
    div.innerHTML = buildSlideHTML(slide, i, slides.length);
    wrap.appendChild(div);
  });

  // PDF slide na koniec
  const pdfDiv = document.createElement('div');
  pdfDiv.className = 'pdf-slide';
  pdfDiv.innerHTML = `
    <div class="pdf-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.8" width="36" height="36"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
    <div class="pdf-title">Lekcja ukonczona!</div>
    <div class="pdf-sub">Pobierz PDF z notatkami z tej lekcji i ucz się offline.</div>
    <button class="pdf-btn" onclick="downloadPDF()">Pobierz PDF z notatkami</button>
    <button class="restart-btn" onclick="endLesson()" style="margin-top:8px;">Wróc do menu</button>
  `;
  wrap.appendChild(pdfDiv);

  updateProgress();
  setTimeout(()=>speakSlide(0), 500);

  // Track scroll
  wrap.addEventListener('scroll', onScroll);
}

function buildSlideHTML(slide, i, total){
  const lines = slide.content.split('\n').filter(l=>l.trim());
  const linesHTML = lines.map((line, li) => {
    const isMath = line.includes('=') && line.length < 60;
    const isFormula = line.startsWith('•') || line.startsWith('-');
    const cls = isMath ? 'math' : isFormula ? 'highlight' : '';
    const delay = li * 0.15;
    // Zaznacz trudne słowa jako klikalane
    const processedLine = line.replace(/\b([A-ZŁÓĄŻŚŹĆĘŃ][a-złóążśźćęń]{4,})\b/g,
      '<span class="explain-word" onclick="explainWord(\'$1\')">$1</span>');
    return `<span class="board-line ${cls}" style="animation-delay:${delay}s">${processedLine}</span><br>`;
  }).join('');

  return `
    <div class="slide-num">${i+1} / ${total}</div>
    <div class="board">
      <div class="board-content">
        <div style="font-family:var(--h);font-size:.72em;font-weight:700;color:var(--accent2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;opacity:.8;">${slide.title || 'Krok '+(i+1)}</div>
        ${linesHTML}
        <span class="cursor-blink" id="cursor-${i}"></span>
      </div>
    </div>
    ${slide.tip ? `<div class="slide-bottom"><div class="slide-tip"><strong>Wskazówka:</strong> ${slide.tip}</div></div>` : ''}
  `;
}

function onScroll(){
  const wrap = document.getElementById('slidesWrap');
  const newSlide = Math.round(wrap.scrollTop / window.innerHeight);
  if(newSlide !== currentSlide && newSlide < slides.length){
    currentSlide = newSlide;
    updateProgress();
    if(voiceEnabled) speakSlide(currentSlide);
  }
}

function nextSlide(){
  const wrap = document.getElementById('slidesWrap');
  currentSlide = Math.min(currentSlide + 1, slides.length);
  wrap.scrollTo({top: currentSlide * window.innerHeight, behavior:'smooth'});
  updateProgress();
  if(voiceEnabled && currentSlide < slides.length) speakSlide(currentSlide);
}

function prevSlide(){
  const wrap = document.getElementById('slidesWrap');
  currentSlide = Math.max(currentSlide - 1, 0);
  wrap.scrollTo({top: currentSlide * window.innerHeight, behavior:'smooth'});
  updateProgress();
  if(voiceEnabled) speakSlide(currentSlide);
}

function updateProgress(){
  const pct = slides.length > 0 ? ((currentSlide+1)/slides.length)*100 : 100;
  document.getElementById('progressFill').style.width = Math.min(pct,100)+'%';
  document.getElementById('stepCounter').textContent = `${Math.min(currentSlide+1,slides.length)} / ${slides.length}`;
  const isLast = currentSlide >= slides.length - 1;
  document.getElementById('nextBtn').textContent = isLast ? 'PDF' : 'Dalej';
}

function speakSlide(idx){
  if(!voiceEnabled || !synth || idx >= slides.length) return;
  synth.cancel();
  const text = slides[idx].speech || slides[idx].content;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'pl-PL';
  utt.rate = 0.9;
  utt.pitch = 1;

  // Wybierz polski głos
  const voices = synth.getVoices();
  const plVoice = voices.find(v=>v.lang==='pl-PL')||voices.find(v=>v.lang.startsWith('pl'));
  if(plVoice) utt.voice = plVoice;

  utt.onstart = ()=>{document.getElementById('voiceIndicator').classList.add('active');};
  utt.onend = ()=>{document.getElementById('voiceIndicator').classList.remove('active');};
  synth.speak(utt);
}

function toggleVoice(){
  voiceEnabled = !voiceEnabled;
  const icon = document.getElementById('voiceIcon');
  if(!voiceEnabled){
    synth.cancel();
    document.getElementById('voiceIndicator').classList.remove('active');
    icon.style.stroke = 'var(--muted)';
  } else {
    icon.style.stroke = 'currentColor';
    speakSlide(currentSlide);
  }
}

async function explainWord(word){
  synth.cancel();
  // Usuń stary popup
  document.querySelectorAll('.explain-popup').forEach(p=>p.remove());

  const popup = document.createElement('div');
  popup.className = 'explain-popup';
  popup.innerHTML = `
    <div class="explain-popup-title">${word}</div>
    <div class="explain-popup-text">Ładowanie wyjaśnienia...</div>
    <button class="explain-popup-close" onclick="this.parentElement.remove();return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  `;
  document.body.appendChild(popup);

  try {
    const res = await fetch(BACKEND+'/api/v1/whiteboard/explain', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({word, context: slides[currentSlide]?.content||''})
    });
    const data = await res.json();
    popup.querySelector('.explain-popup-text').textContent = data.explanation;

    // Mów wyjaśnienie
    if(voiceEnabled){
      const utt = new SpeechSynthesisUtterance(data.explanation);
      utt.lang='pl-PL';utt.rate=0.9;
      const voices=synth.getVoices();
      const plV=voices.find(v=>v.lang==='pl-PL');
      if(plV)utt.voice=plV;
      synth.speak(utt);
    }
  } catch(e){
    popup.querySelector('.explain-popup-text').textContent = 'Błąd ładowania wyjaśnienia.';
  }
}

async function downloadPDF(){
  try {
    const res = await fetch(BACKEND+'/api/v1/whiteboard/pdf', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({slides, topic: document.getElementById('lessonTopicTitle').textContent})
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url;a.download='lekcja_eduvia.pdf';a.click();
    URL.revokeObjectURL(url);
  } catch(e){
    alert('Błąd pobierania PDF');
  }
}

function endLesson(){
  synth.cancel();
  document.getElementById('lessonScreen').style.display='none';
  document.getElementById('setupScreen').style.display='block';
  document.getElementById('topicInput').value='';
  photoBase64=null;
  document.getElementById('photoAdded').style.display='none';
  slides=[];currentSlide=0;
}
</script>
<script src="transitions.js"></script>
<script src="animations.js"></script>
</body>
</html>
